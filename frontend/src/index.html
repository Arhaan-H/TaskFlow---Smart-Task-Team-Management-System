<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- Viewport meta ensures mobile responsiveness -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- SEO description for search engines -->
    <meta
      name="description"
      content="TaskFlow - A smart task and team management system. Organize projects, track tasks, and collaborate with your team efficiently."
    />

    <!-- Open Graph tags for social sharing -->
    <meta property="og:title" content="TaskFlow - Smart Task Management" />
    <meta
      property="og:description"
      content="Organize projects, track tasks, collaborate with your team."
    />
    <meta property="og:type" content="website" />

    <!-- Google Fonts: Inter - Modern, clean sans-serif used throughout the app -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Material Icons font - used by Angular Material components and custom icons -->
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />

    <!-- Roboto font required by Angular Material components internally -->
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap"
      rel="stylesheet"
    />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="favicon.ico" />

    <!-- App title shown in browser tab -->
    <title>TaskFlow - Smart Task Management</title>
  </head>
  <body>
    <!--
      app-root is the selector for our root Angular component (App class in app.ts).
      Angular bootstraps the application by replacing this element with the
      component's rendered template.
    -->
    <app-root></app-root>
  </body>
</html>
